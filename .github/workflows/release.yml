name: Build and Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0 or stable)'
        required: true
        default: 'stable'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: klein.exe
            asset_name: klein-windows-x86_64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: klein
            asset_name: klein-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: klein
            asset_name: klein-linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build binary
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build binary with cross
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux only)
        if: runner.os == 'Linux'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          name_suffix: ${{ matrix.asset_name }}
          tag_name: ${{ github.event.release.tag_name || inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-version:
    name: Update Version in Cargo.toml
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract and Update Version
        run: |
          # Extract version from tag (e.g., v0.2.0 -> 0.2.0)
          VERSION="${{ github.event.release.tag_name }}"
          VERSION=${VERSION#v}
          
          # Update Cargo.toml
          sed -i "s/^version = .*/version = \"$VERSION\"/" Cargo.toml
          
          # Verify the change
          echo "Updated Cargo.toml to version: $VERSION"
          grep "^version" Cargo.toml

      - name: Commit and Push Version Update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Cargo.toml
          git commit -m "chore: bump version to ${{ github.event.release.tag_name }}" || true
          git push origin main

  update-install-scripts:
    name: Update Install Scripts
    needs: build
    runs-on: ubuntu-latest
    if: github.event.release.tag_name == 'stable' || inputs.version == 'stable'
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update install.ps1
        run: |
          sed -i 's|releases/download/[^/]*/klein.exe|releases/download/stable/klein.exe|g' install.ps1

      - name: Update install.sh
        run: |
          sed -i 's|releases/download/[^/]*/klein.exe|releases/download/stable/klein.exe|g' install.sh
          sed -i 's|releases/download/[^/]*/klein|releases/download/stable/klein-linux-x86_64|g' install.sh

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add install.ps1 install.sh
          git commit -m "ci: Update install scripts to point to stable release" --allow-empty || true
          git push

  publish-release:
    name: Publish Release Notes
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
      - uses: actions/checkout@v4

      - name: Create release summary
        run: |
          echo "## Klein Binary Release" > release_notes.md
          echo "" >> release_notes.md
          echo "### Available Downloads:" >> release_notes.md
          echo "- **Windows x86_64**: \`klein-windows-x86_64.exe\`" >> release_notes.md
          echo "- **Linux x86_64**: \`klein-linux-x86_64\`" >> release_notes.md
          echo "- **Linux ARM64**: \`klein-linux-aarch64\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Installation:" >> release_notes.md
          echo "Download the appropriate binary for your platform and add it to your PATH." >> release_notes.md

      - name: Update release notes
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
